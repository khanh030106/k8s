<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello Kubernetes</title>
  <style>
    :root {
      --ink: #1f293d;
      --muted: #40516e;
      --orange: #fb8c00;
      --red-orange: #f4513c;
      --line: #dce5f0;
      --pill-bg: #fbfdff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 100% 0%, rgba(255, 236, 201, 0.72), rgba(255, 255, 255, 0) 32%),
        linear-gradient(180deg, #ffffff 0%, #ffffff 62%, #f8fbff 100%);
    }

    main {
      width: min(1080px, calc(100vw - 36px));
      padding: 56px 0;
      text-align: center;
    }

    .eyebrow {
      margin: 0 0 18px;
      color: var(--orange);
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: clamp(48px, 7vw, 84px);
      line-height: 1;
      font-weight: 850;
      letter-spacing: 0;
    }

    .accent {
      color: var(--orange);
      background: linear-gradient(90deg, var(--orange), var(--red-orange));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      max-width: 920px;
      margin: 24px auto 0;
      color: var(--muted);
      font-size: clamp(22px, 2.3vw, 29px);
      line-height: 1.45;
      font-weight: 400;
    }

    .subtitle strong {
      color: var(--ink);
      font-weight: 800;
    }

    .details {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-top: 28px;
      padding: 0;
      list-style: none;
    }

    .details li {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--pill-bg);
      box-shadow: 0 1px 2px rgba(31, 41, 61, 0.04);
      color: var(--muted);
      font-size: 16px;
      white-space: nowrap;
    }

    .details strong {
      color: var(--ink);
      font-weight: 800;
    }

    @media (max-width: 720px) {
      main {
        padding: 42px 0;
      }

      h1 {
        font-size: clamp(42px, 12vw, 62px);
      }

      .subtitle {
        font-size: 21px;
      }

      .details {
        align-items: stretch;
        flex-direction: column;
      }

      .details li {
        justify-content: center;
        white-space: normal;
      }
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Kubernetes Deployment</p>
    <h1>Hello from <span class="accent">Kubernetes</span></h1>
    <p class="subtitle">
      Deployed by <strong>Khanh</strong>
    </p>
  </main>
</body>
</html>
